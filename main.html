<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMDb - Movie Detail Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrapper">

    <div class="header">
      <h1 class="site-title">IMDb</h1>
    </div>

    <div class="movie-container">

      <img
        class="moviePic"
        src="https://upload.wikimedia.org/wikipedia/en/a/a9/The_Dark_Knight_%282008_film%29.jpg"
        alt="The Dark Knight Poster"
      />

      <div class="movie-info">
        <h2 class="movie-title">The Dark Knight</h2>

        <div class="meta">
          <span class="rating">⭐ 9.0</span>
          <span class="year">2008</span>
          <span class="duration">2h 32m</span>
          <span class="genre">Action | Crime | Drama</span>
        </div>

        <p class="movieDetail">
